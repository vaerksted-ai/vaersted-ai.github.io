<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not found — Værksted</title>
  <meta name="description" content="Not in the workshop's inventory.">
  <meta name="theme-color" content="#F2EBE0">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #F2EBE0;
      --ink: #1A1614;
      --ink-soft: #5C5347;
      --forge: #A8431F;
      --rule: rgba(26, 22, 20, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 18% 22%, rgba(168, 67, 31, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 82% 78%, rgba(26, 22, 20, 0.025) 0%, transparent 55%);
      pointer-events: none;
    }
    .wrap { max-width: 640px; text-align: left; position: relative; z-index: 1; }
    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--forge);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .eyebrow::before {
      content: '';
      width: 28px;
      height: 1px;
      background: var(--forge);
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(80px, 16vw, 200px);
      line-height: 0.88;
      letter-spacing: -0.04em;
      font-weight: 400;
      margin-bottom: 32px;
    }
    h1 .accent { color: var(--forge); font-style: italic; }
    p {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1.3;
      margin-bottom: 40px;
      color: var(--ink);
    }
    a {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 4px;
      transition: all 0.2s ease;
    }
    a:hover { color: var(--forge); border-color: var(--forge); }
    a::before { content: '← '; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Error · 404</div>
    <h1>4<span class="accent">0</span>4</h1>
    <p>Not in the workshop's inventory.</p>
    <a href="/">Back to Værksted</a>
  </div>
</body>
</html>
